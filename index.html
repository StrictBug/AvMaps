<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation map viewer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="loading">
    <header>
        <div class="title-section">
            <h1>Aviation map viewer</h1>
        </div>
        <div class="category-section">
            <div class="category-buttons">
                <button class="category-btn active" data-category="BG">BG</button>
                <button class="category-btn" data-category="TS">TS</button>
                <button class="category-btn" data-category="Airmass">Airmass</button>
                <button class="category-btn" data-category="Turb">Turb</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="image-container">
            <div class="image-pair">
                <div class="image-panel left-panel">
                    <img id="left-image" src="" alt="Left Image">
                </div>
                <div class="image-panel right-panel">
                    <img id="right-image" src="" alt="Right Image">
                </div>
            </div>
        </div>
    </main>

    <div class="loading-overlay" id="loading-overlay" aria-live="polite">
        <div class="loading-card">
            <p class="loading-title">Loading maps</p>
            <div class="loading-bar-track">
                <div class="loading-bar-fill" id="loading-bar-fill"></div>
            </div>
            <p class="loading-status" id="loading-status">Preparing frames...</p>
        </div>
    </div>

    <div class="info-overlay hidden" id="info-overlay" aria-hidden="true">
        <div class="info-card" role="dialog" aria-modal="true" aria-labelledby="info-title">
            <button id="info-close-btn" class="info-close-btn" type="button" aria-label="Close information">×</button>
            <h2 id="info-title" class="info-title">Keyboard Controls</h2>

            <div class="info-section">
                <h3>Switch Category</h3>
                <p><span class="key-chip">B</span> BG</p>
                <p><span class="key-chip">S</span> TS</p>
                <p><span class="key-chip">A</span> Airmass</p>
                <p><span class="key-chip">T</span> Turb</p>
            </div>

            <div class="info-section">
                <h3>Switch Domain</h3>
                <p><span class="key-chip">1</span> Australia - South</p>
                <p><span class="key-chip">2</span> WA/SA</p>
                <p><span class="key-chip">3</span> VIC/TAS</p>
                <p><span class="key-chip">4</span> NSW</p>
            </div>

            <div class="info-section">
                <h3>Playback</h3>
                <p><span class="key-chip">Space</span> Play/Pause</p>
                <p><span class="key-chip">←</span> Previous frame</p>
                <p><span class="key-chip">→</span> Next frame</p>
            </div>
        </div>
    </div>

    <div class="controls">
            <div class="slider-container">
                <input type="range" id="frame-slider" class="frame-slider" min="1" max="40" value="1" step="1">
            </div>
            
            <div class="playback-controls">
                <button id="play-btn" class="control-btn">▶ Play</button>
                <div class="speed-control">
                    <label for="speed-slider"></label>
                    <input type="range" id="speed-slider" min="100" max="1000" value="500" step="100">
                    <span id="speed-display">500ms</span>
                </div>
            </div>
            <button id="info-btn" class="info-btn" type="button" aria-label="Show keyboard controls" title="Keyboard controls">i</button>
        </div>

    <script src="script.js"></script>
</body>
</html>
