<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation map viewer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="loading">
    <header>
        <div class="title-section">
            <h1>Aviation map viewer</h1>
        </div>
        <div class="category-section">
            <div class="category-buttons">
                <button class="category-btn active" data-category="BG">BG</button>
                <button class="category-btn" data-category="TS">TS</button>
                <button class="category-btn" data-category="Airmass">Airmass</button>
                <button class="category-btn" data-category="Turb">Turb</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="image-container">
            <div class="image-pair">
                <div class="image-panel left-panel">
                    <img id="left-image" src="" alt="Left Image">
                </div>
                <div class="image-panel right-panel">
                    <img id="right-image" src="" alt="Right Image">
                </div>
            </div>
        </div>
    </main>

    <div class="loading-overlay" id="loading-overlay" aria-live="polite">
        <div class="loading-card">
            <p class="loading-title">Loading maps</p>
            <div class="loading-bar-track">
                <div class="loading-bar-fill" id="loading-bar-fill"></div>
            </div>
            <p class="loading-status" id="loading-status">Preparing frames...</p>
        </div>
    </div>

    <div class="controls">
            <div class="slider-container">
                <input type="range" id="frame-slider" class="frame-slider" min="1" max="40" value="1" step="1">
            </div>
            
            <div class="playback-controls">
                <button id="play-btn" class="control-btn">▶ Play</button>
                <div class="speed-control">
                    <label for="speed-slider"></label>
                    <input type="range" id="speed-slider" min="100" max="2000" value="500" step="100">
                    <span id="speed-display">500ms</span>
                </div>
            </div>
        </div>

    <script src="script.js"></script>
</body>
</html>
