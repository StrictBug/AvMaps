name: Auto-update aviation maps

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: avmaps-auto-update
  cancel-in-progress: false

jobs:
  update-maps:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev libproj-dev proj-data proj-bin libgeos-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check model readiness and update maps
        run: |
          python scripts/auto_update_maps.py --model both --start-hour 9 --end-hour 35

      - name: Commit and push updates
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No map changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-update maps for $(date -u '+%Y-%m-%d %H:%MZ')"
          git push origin main
